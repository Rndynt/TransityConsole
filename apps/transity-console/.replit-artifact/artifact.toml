kind = "web"
previewPath = "/"
title = "TransityConsole"
version = "1.0.0"
id = "artifacts/transity-console"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19375

[services.development]
run = "pnpm --filter @workspace/transity-console run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transity-console", "run", "build" ]
publicDir = "artifacts/transity-console/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19375"
BASE_PATH = "/"
